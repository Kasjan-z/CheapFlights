name: Flight Check

on:
  schedule:
    - cron: '0 14 * * 2'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4 # Zaktualizowano z v3

      - name: Setup Python
        uses: actions/setup-python@v5 # Zaktualizowano z v4
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flight_hunter.py
