name: Global Flight Hunter (Europa + Świat)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  hunt-flights:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Przygotowanie środowiska Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek (Python)
        run: pip install requests fast-flights

      - name: 🌍 Odpalenie Kolosa (Google Flights)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python google_hunter.py
        continue-on-error: true

      - name: 🇪🇺 Odpalenie Snajpera (Ryanair)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flight_hunter.py
        continue-on-error: true

      - name: 💾 Zapisz historię wysłanych lotów do GitHuba
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [Bot] Zaktualizowano notatnik anty-spamowy"
          file_pattern: sent_deals.txt
