name: Global Flight Hunter (Europa + Świat)

on:
  schedule:
    - cron: '0 14 * * 2'
  workflow_dispatch: 

jobs:
  hunt-flights:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Przygotowanie środowiska Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek (Python)
        run: pip install requests fast-flights

      # ==========================================
      # MÓZG 2: GOOGLE FLIGHTS (ŚWIAT) - NAJPIERW!
      # ==========================================
      - name: 🌍 Odpalenie Kolosa (Google Flights - Świat)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python google_hunter.py
        continue-on-error: true

      # ==========================================
      # MÓZG 1: RYANAIR (EUROPA)
      # ==========================================
      - name: 🇪🇺 Odpalenie Snajpera (Ryanair - Europa)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flight_hunter.py
        continue-on-error: true
